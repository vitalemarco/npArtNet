[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "npartnet"
version = "0.1.0"
description = "A high-performance, NumPy-backed Art-Net matrix client, server, and patcher."
requires-python = ">=3.10"
dependencies = ["numpy"]

[tool.setuptools.packages.find]
where = ["."]
include = ["npArtNet*"]